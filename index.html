<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Econ Master Pro: Dashboard</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.8);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 300px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #word-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .list-item {
            padding: 12px 15px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            color: #94a3b8;
        }

        .list-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .list-item.active { background: rgba(0, 210, 255, 0.2); color: var(--primary); border: 1px solid var(--primary); }
        .list-item.mastered { border-left: 3px solid #22c55e; }

        /* --- MAIN CONTENT --- */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .stats-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .stat-pill {
            background: var(--card);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .quiz-container {
            background: var(--card);
            padding: 40px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .word-display {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900;
            margin-bottom: 25px;
            line-height: 1.1;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            color: white;
            padding: 18px;
            font-size: 16px;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus { border-color: var(--primary); }

        button {
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .submit-btn { background: var(--primary); color: #0f172a; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,210,255,0.4); }

        #grading-zone { display: none; text-align: left; }
        .comparison-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .def-label { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .def-text { display: block; margin-top: 8px; font-size: 1.05rem; line-height: 1.5; color: #e2e8f0; }

        #feedback-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .score-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .correct-btn { background: #22c55e; color: white; }
        .wrong-btn { background: #ef4444; color: white; }

        /* Mobile Styling */
        @media (max-width: 850px) {
            #sidebar { position: absolute; left: -300px; height: 100%; }
            #sidebar.open { transform: translateX(300px); }
            .menu-toggle { display: block; position: absolute; top: 20px; left: 20px; z-index: 110; cursor: pointer; background: var(--card); padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 0.8rem; }
        }
        .menu-toggle { display: none; }
    </style>
</head>
<body>

<div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ LIBRARY</div>

<div id="sidebar">
    <div class="sidebar-header">ECONOMICS DICTIONARY</div>
    <div id="word-list"></div>
</div>

<div id="main-content">
    <div class="stats-bar">
        <div class="stat-pill">🔥 <span id="streak">0</span></div>
        <div class="stat-pill">⭐ <span id="xp">0</span> XP</div>
    </div>

    <div class="quiz-container" id="main-card">
        <div id="rank-display" style="font-size: 0.7rem; color: var(--primary); font-weight: 900; margin-bottom: 5px;">NOVICE ECONOMIST</div>
        <div class="word-display" id="word-display">Loading...</div>
        
        <div id="quiz-ui">
            <textarea id="user-input" placeholder="Explain this concept in your own words..."></textarea>
            <button class="submit-btn" onclick="revealDef()">Check Logic</button>
        </div>

        <div id="grading-zone">
            <div id="feedback-box"></div>

            <div class="comparison-box">
                <span class="def-label">Your Version:</span>
                <span class="def-text" id="user-answer-display"></span>
            </div>
            <div class="comparison-box">
                <span class="def-label">Official Definition:</span>
                <span class="def-text" id="definition-text"></span>
            </div>
            <div class="score-btns">
                <button class="correct-btn" onclick="handleScore(true)">Nailed It!</button>
                <button class="wrong-btn" onclick="handleScore(false)">Missed It</button>
            </div>
        </div>
    </div>
</div>

<script>
    const vocabData = [
        {word: "Wants", def: "Desires for goods and services", keys: ["desire", "good", "service"]},
        {word: "Resources", def: "Factors used to produce goods and services", keys: ["factor", "produce", "production"]},
        {word: "Economic problem", def: "Unlimited wants exceeding finite resources", keys: ["unlimited", "wants", "finite", "resources"]},
        {word: "Scarcity", def: "A situation where there is not enough to satisfy everyone's wants", keys: ["not enough", "satisfy", "wants"]},
        {word: "Economic good", def: "A product which requires resources to produce it and therefore has an opportunity cost", keys: ["require", "resources", "opportunity cost"]},
        {word: "Free good", def: "A product which does not require any resources to make it and so does not have an opportunity cost", keys: ["no", "require", "resources", "cost"]},
        {word: "Capital goods", def: "Human-made goods used in production", keys: ["human", "made", "production"]},
        {word: "Consumer goods", def: "Goods and services purchased by households for their own satisfaction", keys: ["purchase", "household", "satisfaction"]},
        {word: "Entrepreneur", def: "A person who bears the risks and makes the key decisions in a business", keys: ["risk", "decision", "business"]},
        {word: "Opportunity cost", def: "The next best alternative forgone while making an economic decision", keys: ["next best", "alternative", "forgone"]},
        {word: "Production possibility curve", def: "A curve that shows the maximum output of two types of products with existing resources", keys: ["maximum", "output", "two", "products"]},
        {word: "Microeconomics", def: "The study of the behaviour and decisions of households and firms", keys: ["behaviour", "household", "firm"]},
        {word: "Macroeconomics", def: "The study of the whole economy", keys: ["whole", "economy"]},
        {word: "Market", def: "An arrangement which brings buyers into contact with sellers", keys: ["buyer", "seller", "contact"]},
        {word: "Planned economic system", def: "An economic system where the government makes the crucial decisions", keys: ["government", "decision", "state"]},
        {word: "Market economic system", def: "An economic system where consumers determine what is produced via the price mechanism", keys: ["consumer", "price mechanism", "private"]},
        {word: "Mixed economic system", def: "An economy in which both the private and public sectors play an important role", keys: ["private", "public", "sector"]},
        {word: "Price mechanism", def: "The way the decisions made by households and firms interact to decide resource allocation", keys: ["decision", "interact", "allocation"]},
        {word: "Demand", def: "The willingness and ability to buy a product", keys: ["willingness", "ability", "buy"]},
        {word: "Supply", def: "The willingness and ability to sell a product", keys: ["willingness", "ability", "sell"]},
        {word: "Market equilibrium", def: "A situation where demand and supply are equal at the current price", keys: ["demand", "supply", "equal"]},
        {word: "Normal goods", def: "A product whose demand increases when income increases", keys: ["demand", "increase", "income"]},
        {word: "Inferior goods", def: "A product whose demand decreases when income increases", keys: ["demand", "decrease", "income"]},
        {word: "Substitute", def: "A product that can be used in place of another", keys: ["place", "another", "instead"]},
        {word: "Complement", def: "A product that is used together with another product", keys: ["together", "with", "another"]},
        {word: "Unit cost", def: "The average cost of production (Total Cost / Output)", keys: ["average", "cost", "output"]},
        {word: "Direct taxes", def: "Taxes on the income and wealth of individuals and firms", keys: ["tax", "income", "wealth"]},
        {word: "Indirect taxes", def: "Taxes on goods and services", keys: ["tax", "good", "service"]},
        {word: "Subsidy", def: "A payment by the government to encourage production or consumption", keys: ["payment", "government", "encourage"]},
        {word: "PED", def: "A measure of the responsiveness of the quantity demanded to a change in price", keys: ["responsiveness", "quantity demanded", "price"]},
        {word: "PES", def: "A measure of the responsiveness of the quantity supplied to a change in price", keys: ["responsiveness", "quantity supplied", "price"]},
        {word: "Market failure", def: "Market forces resulting in an inefficient allocation of resources", keys: ["inefficient", "allocation", "resources"]},
        {word: "Public good", def: "A non-rival and non-excludable product", keys: ["non-rival", "non-excludable"]},
        {word: "Monopoly", def: "A single seller", keys: ["single", "seller", "one"]},
        {word: "Money", def: "An item which is generally acceptable as a means of payment", keys: ["acceptable", "means", "payment"]},
        {word: "Disposable income", def: "Income left after income tax has been deducted", keys: ["left", "after", "tax"]},
        {word: "Wage rate", def: "A payment which an employer contracts to pay a worker", keys: ["payment", "employer", "worker"]},
        {word: "Specialisation", def: "The concentration on particular products or tasks", keys: ["concentration", "product", "task"]},
        {word: "Division of labour", def: "Workers specialising in particular tasks", keys: ["worker", "specialise", "task"]},
        {word: "Trade union", def: "An association which represents the interests of a group of workers", keys: ["association", "represent", "worker"]},
        {word: "Internal economies of scale", def: "Lower long-run average costs resulting from a firm growing", keys: ["lower", "cost", "growing"]},
        {word: "Fixed costs", def: "Costs which do not change with output in the short run", keys: ["not", "change", "output"]},
        {word: "Variable cost", def: "Costs that change with output", keys: ["change", "with", "output"]},
        {word: "Total revenue", def: "The total amount of money received from selling a product", keys: ["total", "money", "selling"]},
        {word: "Economic growth", def: "An increase in the output of an economy in the long run", keys: ["increase", "output", "long run"]},
        {word: "GDP", def: "The total output of a country", keys: ["total", "output", "country"]},
        {word: "Inflation", def: "The rise in the price level of goods and services over time", keys: ["rise", "price", "level"]},
        {word: "Deflation", def: "A sustained fall in the prices of goods and services", keys: ["fall", "price", "sustained"]},
        {word: "Recession", def: "A reduction in real GDP over a period of six months or more", keys: ["reduction", "gdp", "six months"]},
        {word: "Unemployment rate", def: "Percentage of the labour force without jobs but willing to work", keys: ["percentage", "labour force", "without"]},
        {word: "Globalisation", def: "The process by which the world is becoming increasingly interconnected", keys: ["world", "interconnected", "trade"]}
    ];

    let xp = parseInt(localStorage.getItem('econ_xp_v3')) || 0;
    let streak = parseInt(localStorage.getItem('econ_streak_v3')) || 0;
    let mastered = JSON.parse(localStorage.getItem('mastered_v3')) || [];
    let currentIndex = 0;

    function init() {
        const list = document.getElementById('word-list');
        vocabData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `list-item ${mastered.includes(item.word) ? 'mastered' : ''}`;
            div.id = `item-${index}`;
            div.innerHTML = `<span>${item.word}</span> <span class="status">${mastered.includes(item.word) ? '✅' : ''}</span>`;
            div.onclick = () => loadWord(index);
            list.appendChild(div);
        });

        updateStats();
        loadWord(0);
    }

    function loadWord(index) {
        currentIndex = index;
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${index}`).classList.add('active');
        document.getElementById('word-display').innerText = vocabData[index].word;
        document.getElementById('user-input').value = '';
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('grading-zone').style.display = 'none';
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('feedback-box').style.display = 'none';
    }

    function revealDef() {
        const userIn = document.getElementById('user-input').value;
        const userLower = userIn.toLowerCase();
        const current = vocabData[currentIndex];
        
        document.getElementById('user-answer-display').innerText = userIn || "(No input)";
        document.getElementById('definition-text').innerText = current.def;

        // Smart Feedback Logic
        let missing = [];
        current.keys.forEach(k => {
            if (!userLower.includes(k)) missing.push(k);
        });

        const fb = document.getElementById('feedback-box');
        if (userIn.length < 3) {
            fb.style.display = "none";
        } else if (missing.length > 0) {
            fb.innerHTML = `⚠️ <b>Correction Tip:</b> Try to include these key technical terms: <span style="color:#fbbf24">${missing.join(", ")}</span>`;
            fb.style.display = "block";
        } else {
            fb.innerHTML = `✅ <b>Great terminology!</b> Your answer contains the core keywords required.`;
            fb.style.display = "block";
        }

        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('grading-zone').style.display = 'block';
    }

    function handleScore(correct) {
        if (correct) {
            streak++;
            xp += 15;
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 }, colors: ['#00d2ff', '#9d50bb'] });
            
            if (!mastered.includes(vocabData[currentIndex].word)) {
                mastered.push(vocabData[currentIndex].word);
                const item = document.getElementById(`item-${currentIndex}`);
                item.classList.add('mastered');
                item.querySelector('.status').innerText = '✅';
            }
        } else {
            streak = 0;
            document.getElementById('main-card').animate([
                { transform: 'translateX(0)' }, { transform: 'translateX(10px)' }, { transform: 'translateX(-10px)' }, { transform: 'translateX(0)' }
            ], { duration: 200 });
        }

        save();
        updateStats();
        
        // Auto-advance
        if (currentIndex < vocabData.length - 1) {
            setTimeout(() => loadWord(currentIndex + 1), 600);
        }
    }

    function updateStats() {
        document.getElementById('xp').innerText = xp;
        document.getElementById('streak').innerText = streak;
        
        let rank = "NOVICE ECONOMIST";
        if (xp > 200) rank = "MARKET ANALYST";
        if (xp > 500) rank = "POLICY ADVISOR";
        if (xp > 1000) rank = "CENTRAL BANK GOVERNOR";
        if (xp > 2000) rank = "GLOBAL ECONOMIC LEGEND";
        document.getElementById('rank-display').innerText = rank;
    }

    function save() {
        localStorage.setItem('econ_xp_v3', xp);
        localStorage.setItem('econ_streak_v3', streak);
        localStorage.setItem('mastered_v3', JSON.stringify(mastered));
    }

    window.onload = init;
</script>

</body>
</html>
