<!DOCTYPE html>
<html lang="en">
<head>
    <title>IGCSE Econ Master Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .stats-bar {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .stat-pill {
            background: var(--card);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quiz-container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .level-badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 10px;
            display: block;
        }

        .word-display {
            font-size: clamp(24px, 5vw, 38px);
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            width: 100%;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        #grading-zone {
            display: none;
            margin-top: 10px;
            text-align: left;
        }

        .comparison-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--secondary);
        }

        .def-label { color: var(--primary); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .def-text { display: block; margin: 5px 0 15px 0; font-size: 1.1rem; line-height: 1.4; }

        .score-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .correct-btn { background: #22c55e; color: white; }
        .wrong-btn { background: #ef4444; color: white; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

<div class="stats-bar">
    <div class="stat-pill">🔥 <span id="streak">0</span></div>
    <div class="stat-pill">⭐ <span id="xp">0</span> XP</div>
</div>

<div class="quiz-container">
    <span class="level-badge" id="rank">Novice Economist</span>
    <div id="progress-text" style="font-size: 0.8rem; color: #64748b;">Loading...</div>
    
    <div class="word-display" id="word-display">Ready?</div>
    
    <div id="quiz-ui">
        <textarea id="user-input" placeholder="Type your definition here..."></textarea>
        <button class="submit-btn" onclick="revealDef()">Check Logic</button>
    </div>

    <div id="grading-zone">
        <div class="comparison-box">
            <span class="def-label" style="color: #94a3b8;">Your Version:</span>
            <span class="def-text" id="user-answer-display" style="font-size: 1rem;"></span>
        </div>

        <span class="def-label">Official Logic:</span>
        <span class="def-text" id="definition-text"></span>
        
        <div class="score-btns">
            <button class="correct-btn" onclick="handleScore(true)">Nailed It!</button>
            <button class="wrong-btn" onclick="handleScore(false)">Missed It</button>
        </div>
    </div>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>
</div>

        {word: "Menu costs", def: "costs involved in having to change prices as a result of inflation"},
        {word: "Shoe-leather costs", def: "costs involved in moving money around to gain higher interest rates"},
        {word: "Purchasing power parity", def: "an exchange rate based on the ratio of the price of a basket of a products in different countries"},
        {word: "Human development index (HDI)", def: "a measure of living standards which takes into account income, education and life expectancy"},
        {word: "Absolute poverty", def: "a condition where people's income is too low to enable them to meet their basic needs"},
        {word: "Relative poverty", def: "a condition where people are poor in comparison to others in the country. Their income is too low to enable them to enjoy the average standard of living in their country"},
        {word: "Vicious circle of poverty", def: "a situation where people become trapped in poverty"},
        {word: "Emigration", def: "the act of leaving the country to live in another country"},
        {word: "Death rate", def: "the number of deaths in a year per 1000 population in a year"},
        {word: "Infant mortality rate", def: "the number of deaths per 1000 live births in a year"},
        {word: "Population pyramid", def: "a diagram showing the age and gender structure of a country's population"},
        {word: "Optimum population", def: "the size of population which maximizes the country’s output per head"},
        {word: "Economic development", def: "an improvement in economic welfare"},
        {word: "Globalisation", def: "the process by which the world is becoming increasingly interconnected through trade and other links"},
        {word: "Quota", def: "a limit placed on imports and exports"},
        {word: "Embargo", def: "a ban placed on imports and exports"},
        {word: "Exchange control", def: "a limit on the amount of foreign currency that can be obtained"},
        {word: "Infant industries", def: "new industries with relatively low output and high cost"},
        {word: "Declining industries", def: "old industries which are going out of business"},
        {word: "Fixed exchange rate", def: "an exchange rate whose value is set at a particular value in terms of another currency or currencies"},
        {word: "Devaluation", def: "a fall in the value of a fixed exchange rate"},
        {word: "Revaluation", def: "a rise in the value of a fixed exchange rate"},
        {word: "Floating exchange rate", def: "an exchange rate which can change frequently as it determined by market forces"},
        {word: "Appreciation", def: "a rise in the value of a floating exchange rate"},
        {word: "Trade in goods", def: "the value of exported goods and imported goods"},
        {word: "Trade in goods deficit", def: "expenditure on imported goods exceeding revenue from exported goods"},
        {word: "Trade in goods surplus", def: "revenue from exported goods exceeding expenditure on imported goods"},
        {word: "Trade in services", def: "the value of exported services and imported services"},
        {word: "Trade in services deficit", def: "expenditure on imported services exceeding revenue from exported services"},
        {word: "Primary income", def: "income earned by people working in different countries and investment income which comes into and goes out of the country"},
        {word: "Secondary income", def: "transfers between residents and non-residents of money, goods or services, not in return for anything else"},
        {word: "Current account balance", def: "a record of the income received and the expenditure made by a country in its dealings with other countries"}
    ];

    let streak = 0;
    let xp = 0;
    let currentIndex = 0;
    let shuffledVocab = [];

    function init() {
        shuffledVocab = [...vocabData].sort(() => Math.random() - 0.5);
        updateUI();
    }

    function updateUI() {
        if (currentIndex < shuffledVocab.length) {
            document.getElementById('word-display').innerText = shuffledVocab[currentIndex].word;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${shuffledVocab.length} Mastery`;
            document.getElementById('progress-fill').style.width = `${((currentIndex) / shuffledVocab.length) * 100}%`;
            document.getElementById('user-input').value = '';
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('grading-zone').style.display = 'none';
        } else {
            document.getElementById('word-display').innerText = "Level Maxed! 🎉";
            document.getElementById('quiz-ui').style.display = 'none';
        }
        updateRank();
    }

    function revealDef() {
        const userText = document.getElementById('user-input').value;
        document.getElementById('user-answer-display').innerText = userText || "(No answer entered)";
        document.getElementById('definition-text').innerText = shuffledVocab[currentIndex].def;
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('grading-zone').style.display = 'block';
    }

    function handleScore(isCorrect) {
        if (isCorrect) {
            streak++;
            xp += 10 + (streak * 2); 
        } else {
            streak = 0;
        }
        currentIndex++;
        document.getElementById('streak').innerText = streak;
        document.getElementById('xp').innerText = xp;
        updateUI();
    }

    function updateRank() {
        let rank = "Novice Economist";
        if (xp > 100) rank = "Market Analyst";
        if (xp > 300) rank = "Policy Advisor";
        if (xp > 600) rank = "Central Bank Governor";
        if (xp > 1000) rank = "Economic Legend";
        document.getElementById('rank').innerText = rank;
    }

    window.onload = init;
</script>
